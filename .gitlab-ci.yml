include:
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/SAST-IaC.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  # Commented out as we are using our own tool for license scanning
  # - template: Jobs/License-Scanning.gitlab-ci.yml
  - component: gitlab.com/infor-cloud/gitlab-components/software-bill-of-materials/generate-sbom-go@$SBOM_COMPONENT_VERSION
    inputs:
      module_path: "."
      main: cmd/tharsis
      assert_licenses: true
      std: true
      go_arch_os:
        - GO_ARCH: "386"
          GO_OS: [freebsd, linux, openbsd, windows]
        - GO_ARCH: amd64
          GO_OS: [darwin, freebsd, linux, openbsd, solaris, windows]
        - GO_ARCH: arm
          GO_OS: [freebsd, linux]
        - GO_ARCH: arm64
          GO_OS: [darwin, linux]
      cgo_enabled: "0"
      verbose: true
      remote_sbom_component_mapping_file_namespace_path: infor-cloud/martian-cloud/sbom-component-mapping
      remote_sbom_component_mapping_file_branch: main
      remote_sbom_component_mapping_file_path: mapping-go.json
    rules:
      - if: $CI_COMMIT_TAG
  - component: gitlab.com/infor-cloud/gitlab-components/software-bill-of-materials/merge-sboms@$SBOM_COMPONENT_VERSION
    inputs:
      hierarchical: true
      name: tharsis-cli
      version: $CI_COMMIT_TAG

stages:
  - test
  - build
  - upload
  - release

# Only start pipelines on Merge Requests, the default branch, and tags
workflow:
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
      when: always
    - if: $CI_MERGE_REQUEST_IID
      when: always
    - if: $CI_COMMIT_TAG
      when: always
    - when: never

variables:
  # Go project settings
  GO_VERSION: "1.26"
  CGO_ENABLED: "0"
  GOPATH_RELATIVE_PATH: .go
  GOPATH: "$CI_PROJECT_DIR/$GOPATH_RELATIVE_PATH"
  GOCACHE: "$GOPATH/cache"
  GITLAB_ADVANCED_SAST_ENABLED: "true"
  SAST_EXCLUDED_PATHS: "$GOPATH_RELATIVE_PATH, docker-compose"
  SECRET_DETECTION_EXCLUDED_PATHS: "$GOPATH_RELATIVE_PATH"
  PROJECT_NAME: "tharsis-cli"
  UNVERSIONED_PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PROJECT_NAME}"

default:
  tags:
    - oss
  retry:
    max: 2
    when:
      - unknown_failure
      - api_failure
      - stuck_or_timeout_failure
      - runner_system_failure
  interruptible: true

.cache-template: &cache-template
  key: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
  paths:
    - ".go/pkg/mod"
    - ".go/cache"

#################################
##            RULES            ##
#################################

.on_merge_request_and_merged_events:
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH || $CI_PIPELINE_SOURCE == "merge_request_event"'

.on_tag_events:
  rules:
    - if: "$CI_COMMIT_TAG"

.on_default_branch_and_merge_train_with_golang_changes:
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success
    - if: $CI_MERGE_REQUEST_EVENT_TYPE == "merge_train"
      changes:
        - "**/go.mod"
        - "**/go.sum"
        - go.mod
        - go.sum

#################################
##          CHANGELOG          ##
#################################

# Enforce that every MR adds a changie fragment. Exempted by the `skip-changelog`
# label (e.g. release MRs, pure refactors) or by a Draft MR title.
changelog-check:
  image: alpine:3.22.1
  stage: test
  needs: []
  variables:
    GIT_DEPTH: 0
  before_script:
    - apk add --no-cache git
  script:
    - |
      set -eu
      # Diff against the MR's base SHA, which GitLab guarantees is available in
      # MR pipelines — unlike origin/<target>, whose remote-tracking ref is not
      # guaranteed to be fetched (GIT_DEPTH: 0 removes the depth limit but does
      # not fetch the target branch). Compute the diff up front so a git failure
      # surfaces as a real error instead of being mistaken for "no fragment".
      changed=$(git diff --name-only "$CI_MERGE_REQUEST_DIFF_BASE_SHA" HEAD)
      if printf '%s\n' "$changed" | grep -q "^\.changes/unreleased/"; then
        echo "✅ Changelog fragment found"
      else
        echo "❌ No changelog fragment found. Run 'changie new' and commit the fragment."
        echo "If this change does not need a changelog entry, add the 'skip-changelog' label to the MR."
        exit 1
      fi
  rules:
    - if: $CI_MERGE_REQUEST_LABELS =~ /skip-changelog/
      when: never
    - if: $CI_MERGE_REQUEST_TITLE =~ /^Draft:/
      when: never
    - if: $CI_MERGE_REQUEST_IID

# When a release commit (a CHANGELOG.md version bump) lands on the default branch,
# create the matching git tag. That tag triggers the existing tag pipeline
# (Build / Upload / Release Tharsis CLI) which builds the binaries and cuts the
# GitLab release. Runs after the test stage so a release is never tagged on red.
auto-tag-release:
  image: alpine:3.22.1
  stage: build
  before_script:
    - apk add --no-cache git curl
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - |
      set -euo pipefail
      # Top version from changelog (versionFormat: "## v{{.Version}} - ...") — keep the 'v'
      VERSION=$(grep -m1 '^## v' CHANGELOG.md | sed -E 's/^## (v[^ ]+).*/\1/')
      [ -n "$VERSION" ] || { echo "No version header in CHANGELOG.md"; exit 1; }

      # Idempotency: no-op if the tag already exists (exact ref match)
      if git ls-remote --tags origin "refs/tags/${VERSION}" | grep -q "refs/tags/${VERSION}$"; then
        echo "Tag ${VERSION} already exists — nothing to do."
        exit 0
      fi

      # Notes = lines between the top "## v" and the next "## v"
      NOTES=$(awk '/^## v/{c++} c==1{print} c==2{exit}' CHANGELOG.md | tail -n +2)

      echo "Creating tag ${VERSION} at ${CI_COMMIT_SHA}"
      curl --fail-with-body --request POST \
        --header "PRIVATE-TOKEN: ${RELEASE_TOKEN}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/repository/tags" \
        --data-urlencode "tag_name=${VERSION}" \
        --data-urlencode "ref=${CI_COMMIT_SHA}" \
        --data-urlencode "message=${NOTES}"

# Manual release cutter. Batches the accumulated changie fragments into
# CHANGELOG.md and pushes the bump straight to the default branch — no MR,
# since the fragments were already reviewed when their own MRs merged. That
# push triggers a fresh default-branch pipeline whose auto-tag-release job
# tags the new version and kicks off build / upload / release.
#
# Pipeline variables (set when running the manual job):
#   RELEASE_VERSION    optional base version (e.g. v1.2.3). Auto-computed from the
#                      fragments' bump levels if unset.
#   RELEASE_PRERELEASE optional prerelease suffix (e.g. alpha.1). When set, cuts a
#                      prerelease: the version becomes <base>-<suffix> and the
#                      fragments are KEPT so the eventual final release still lists
#                      them. When unset (a final release), any superseded prerelease
#                      changelog sections are removed.
# Note: once a prerelease has been cut for a release cycle, pass RELEASE_VERSION
# explicitly for any further prereleases and for the final — auto-compute would
# over-bump (it treats the prerelease as the latest version).
release-prep:
  image: golang:${GO_VERSION}-alpine
  # .post runs last, and with no `needs` this job inherits stage ordering — it only
  # becomes runnable after every earlier stage has succeeded, so a release is never
  # cut on a red pipeline. (Do not add `needs: []`: that would let it start
  # immediately at pipeline creation, bypassing the .post gating.)
  stage: .post
  variables:
    GIT_DEPTH: 0
  before_script:
    - apk add --no-cache git make
    - go install github.com/miniscruff/changie@v1.24.0
    - export PATH="$PATH:$GOPATH/bin"
  rules:
    # allow_failure: true makes this an *optional* manual job. With when: manual
    # inside rules, allow_failure defaults to false (a blocking manual job), which
    # would stop every default-branch pipeline at this stage until someone runs it.
    # Optional means it never blocks or fails the pipeline — maintainers run it on demand.
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true
  interruptible: false
  script:
    - |
      set -euo pipefail

      git config --global --add safe.directory "$CI_PROJECT_DIR"

      # Nothing to release if there are no unreleased fragments (ignore .gitkeep).
      # Not an error — exit 0 so a no-op run is a clean, green no-op.
      if [ -z "$(ls -A .changes/unreleased 2>/dev/null | grep -v '^\.gitkeep$' || true)" ]; then
        echo "No unreleased changelog fragments found — nothing to release."
        exit 0
      fi

      # Batch fragments into CHANGELOG.md. RELEASE_VERSION/RELEASE_PRERELEASE optional.
      make release-prep VERSION="${RELEASE_VERSION:-}" PRERELEASE="${RELEASE_PRERELEASE:-}"

      # Guard against a no-op (e.g. changie produced no diff).
      if [ -z "$(git status --porcelain)" ]; then
        echo "release-prep produced no changes — nothing to commit."
        exit 1
      fi

      VERSION=$(grep -m1 '^## v' CHANGELOG.md | sed -E 's/^## (v[^ ]+).*/\1/')
      echo "Prepared release ${VERSION}"

      git config user.name "release-bot"
      git config user.email "release-bot@noreply.${CI_SERVER_HOST}"
      git add CHANGELOG.md .changes/
      git commit -m "chore(release): ${VERSION}"

      # Push the bump straight to the default branch, authenticating with an
      # Authorization header rather than embedding the token in the remote URL.
      # Git echoes the remote URL in its error output (e.g. on a non-fast-forward
      # rejection), which would leak the token into the job log; it does not echo
      # extra headers. GitLab Git-over-HTTPS uses Basic auth (any non-empty
      # username + the token as the password), so we send a Basic header.
      # RELEASE_TOKEN must be a masked + protected CI/CD variable.
      # No [skip ci]: the push must trigger a pipeline so auto-tag-release runs.
      # Not a force push — if main has moved, the push is rejected (re-run after rebasing).
      auth=$(printf '%s' "oauth2:${RELEASE_TOKEN}" | base64 | tr -d '\n')
      git -c http.extraHeader="Authorization: Basic ${auth}" \
        push "https://${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" "HEAD:${CI_DEFAULT_BRANCH}"

#################################
##            BUILD            ##
#################################
Generate:
  image: golang:${GO_VERSION}-alpine
  stage: test
  before_script:
    - apk add git openssh make
  script:
    - |
      go mod download
      make generate
      git diff --compact-summary --exit-code || \
            (echo; echo "Unexpected difference in directories after code generation. Run 'make generate' command and commit."; exit 1)

tests:
  image: golang:${GO_VERSION}-alpine
  stage: test
  before_script:
    - export PATH=$PATH:$GOPATH/bin
    - apk add git bash openssh ca-certificates
    - go install github.com/jstemmer/go-junit-report@latest
    - go install github.com/boumenot/gocover-cobertura@latest
  script:
    - |
      go mod download
      go vet $(go list ./... | grep -v /vendor/)
      go test -covermode=atomic -coverpkg  gitlab.com/infor-cloud/martian-cloud/tharsis/tharsis-cli/... -v -coverprofile .coverage ./... 2>&1 | tee .test-results
      go tool cover -func .coverage | tail
      go-junit-report -set-exit-code < .test-results > .xunit-results.xml
      gocover-cobertura < .coverage > coverage.xml
  artifacts:
    when: always
    reports:
      junit: .xunit-results.xml
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
  coverage: '/\(statements\)\s*(\d+(?:\.\d+)?%)/'
  cache:
    <<: *cache-template

linting:
  image: golang:${GO_VERSION}-alpine
  stage: test
  before_script:
    - export PATH=$PATH:$GOPATH/bin
    - apk add git bash openssh ca-certificates make
    - go install github.com/mgechev/revive@$GO_LINTER_VERSION
  script:
    - go mod download
    - make lint
  cache:
    <<: *cache-template

Build:
  image: golang:${GO_VERSION}-alpine
  stage: build
  before_script:
    - apk add git openssh make
  script:
    - make build
  artifacts:
    when: always
  cache:
    <<: *cache-template

Build Tharsis CLI Release:
  image: golang:${GO_VERSION}-alpine
  stage: build
  before_script:
    - apk add tar gzip curl git openssh make
  script:
    - VERSION=$CI_COMMIT_TAG make release
  artifacts:
    paths:
      - bin/
  cache:
    <<: *cache-template
  rules:
    - !reference [.on_tag_events, rules]

Upload Tharsis CLI:
  stage: upload
  image: curlimages/curl:latest
  script:
    - |
      set -x
      BINARIES="./bin/*"
      for BINARY in $BINARIES
      do
        BINARY_NAME=$(basename $BINARY)
        curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" --upload-file $BINARY "${UNVERSIONED_PACKAGE_REGISTRY_URL}/${CI_COMMIT_TAG}/${BINARY_NAME}"
      done
  rules:
    - !reference [.on_tag_events, rules]

Release Tharsis CLI:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - !reference [.on_tag_events, rules]
  script:
    - |
      set -x
      echo "Tharsis CLI Release"

      ASSETS=""
      BINARIES="./bin/*"
      for BINARY in $BINARIES
      do
        BINARY_NAME=$(basename $BINARY)
        ASSETS="$ASSETS --assets-link {\"name\":\"${BINARY_NAME}\",\"url\":\"${UNVERSIONED_PACKAGE_REGISTRY_URL}/${CI_COMMIT_TAG}/${BINARY_NAME}\"}"
      done

      # Use this version's changelog notes as the release description.
      # Falls back to a generic line if no matching section exists.
      NOTES=""
      if [ -f CHANGELOG.md ]; then
        NOTES=$(awk -v tag="$CI_COMMIT_TAG" '
          index($0, "## " tag " ") == 1 {f=1; next}
          f && /^## v/ {exit}
          f {print}
        ' CHANGELOG.md)
      fi
      if [ -z "$NOTES" ]; then
        NOTES="Tharsis CLI Release $CI_COMMIT_TAG"
      fi

      release-cli create \
        --name "Release $CI_COMMIT_TAG" \
        --description "$NOTES" \
        --tag-name $CI_COMMIT_TAG \
        --ref $CI_COMMIT_TAG $ASSETS

#################################
##            SAST             ##
#################################

gemnasium-dependency_scanning:
  variables:
    DS_EXCLUDED_PATHS: "$GOPATH_RELATIVE_PATH"
  rules:
    - !reference [.on_merge_request_and_merged_events, rules]

gitlab-advanced-sast:
  rules:
    - !reference [.on_merge_request_and_merged_events, rules]

kics-iac-sast:
  rules:
    - !reference [.on_merge_request_and_merged_events, rules]

secret_detection:
  rules:
    - !reference [.on_merge_request_and_merged_events, rules]

license_scanning:
  stage: test
  image: golang:${GO_VERSION}-alpine
  allow_failure: true
  before_script:
    - export PATH=$PATH:$GOPATH/bin
    - apk add git bash openssh ca-certificates make jq
    - go install github.com/uw-labs/lichen@latest
  script:
    - make build
    - lichen -j lichen.json $CI_PROJECT_DIR/tharsis
    - >
      jq '{"version": "2.1","licenses": [ . | .Modules[] | .Licenses[] | {"id": .Name,"name": .Name, "url": ("https://opensource.org/licenses/" + .Name) } ] | unique,"dependencies":[ . | .Modules[] | {"name": .Path, "version": .Version, "package_manager": "go","path": "go.sum","licenses": [ .Licenses[] | .Name]}]}' lichen.json > gl-license-scanning-report.json
  cache:
    <<: *cache-template
  artifacts:
    reports:
      license_scanning: gl-license-scanning-report.json
    paths: [gl-license-scanning-report.json]
  dependencies: []
  rules:
    - !reference [.on_default_branch_and_merge_train_with_golang_changes, rules]

merge-cyclonedx-sboms:
  rules:
    - !reference [.on_tag_events, rules]
  needs:
    - job: "go-sbom (cmd/tharsis,0)"
      optional: true

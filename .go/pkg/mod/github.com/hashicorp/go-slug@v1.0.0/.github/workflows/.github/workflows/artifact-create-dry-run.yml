name: "Dry Run Build"

on:
  push:
    branches:
      - 'pull/IND-6310' # Trigger specifically on your current branch

jobs:
  test-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Build & Package
        run: |
          mkdir -p dist
          # Build the package
          go build -v -o dist/go-slug-test . 
          # Create the gzip artifact
          tar -czvf dist/go-slug-test-artifact.tar.gz -C dist .

      - name: Upload for Inspection
        uses: actions/upload-artifact@v4
        with:
          # We use a safe name for the artifact (slashes in filenames can be tricky)
          name: dry-run-binary-IND-6310
          path: dist/go-slug-test-artifact.tar.gz
          retention-days: 1